<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLO AI 录制器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-badge" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <path d="m7 11 2-2-2-2"></path>
          <path d="M11 13h6"></path>
        </svg>
      </div>
      <div class="logo-text">
        <h1>SOLO AI</h1>
        <div class="sub">录制器</div>
      </div>
    </div>
    <div class="pill" id="theme-pill">自动主题</div>
  </div>

  <div class="panel">
    <div class="status-box">
      <div class="status-indicator">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">系统就绪</span>
      </div>
      <div class="action-counter">
        <span class="label">已录制动作</span>
        <span id="action-count" class="count font-mono">0</span>
      </div>
    </div>

    <div id="sync-status" class="sync-status"></div>

    <div class="buttons">
      <button id="start-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
        开始录制
      </button>
      <button id="stop-btn" class="btn btn-danger" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        停止并同步
      </button>
      <button id="open-console-btn" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M10 14 21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>
        打开控制台
      </button>
      <button id="clear-btn" class="btn btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        清空数据
      </button>
    </div>
  </div>

  <div class="footer">
    <p>自然语言生成用例 · 可视化回放 · 自愈与审计</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
